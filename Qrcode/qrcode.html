<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment form</title>
    <link rel="stylesheet" href="qrcode.css">
</head>

<body>
    <h1>Appointment</h1>
    <!-- <sub id="tagline">For Emergency Pass</sub> -->
    <div class="container">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br><br>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone"><br><br>
        <div class="imgBox">
            <img src="" id="qrImg">
        </div>
        <button onclick="QRgenerator()">Generate QR</button>
    </div>
    <br>

</body>



<script>

    let imgBox = document.getElementById("imgBox");
    let qrImg = document.getElementById("qrImg");
    let name = document.getElementById("name");
    let age = document.getElementById("age");
    let phone = document.getElementById("phone");


    function QRgenerator() {
        // if (name.value.length > 0 && age.value.length>0 && age.value.length>0) {

            qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Name:" + name.value + "Age:" + age.value + "phone:" + phone.value;
            imgBox.classList.add("show-img");
        // } else {
        //     qrText.classList.add('error');
        //     setTimeout(()=>{
        //         qrText.classList.remove('error');
        //     }, 1000);
        // }

    }
</script>

</html>
